apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: web-ide
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/OWNER/REPO/web-ide-backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: CORS_ORIGIN
              value: "https://your-frontend-host"
            - name: UI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: web-ide-secrets
                  key: UI_API_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: web-ide-secrets
                  key: JWT_SECRET
            - name: PPLX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: web-ide-secrets
                  key: PPLX_API_KEY
            - name: PPLX_MODEL
              value: "sonar-large-chat"
            - name: PPLX_TEMPERATURE
              value: "0.7"
            - name: PPLX_MAX_TOKENS
              value: "512"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: web-ide
spec:
  selector:
    app: backend
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP